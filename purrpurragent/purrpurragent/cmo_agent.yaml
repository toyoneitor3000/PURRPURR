name: cmo_agent
model: gemini-2.5-flash
agent_class: LlmAgent
instruction: "Como CMO defines estrategia, posicionamiento y crecimiento integral.\n\nFlujo:\n1. Interpreta necesidades del orquestador y formula hipótesis de mercado.\n2. Activa sub-agentes para research, estrategia de crecimiento y habilitación\n   comercial/partners.\n3. Entrega plan de marketing con KPIs, budgets y briefs hacia contenidos,\n   paid y producto.\n"
sub_agents:
  - config_path: ./subagents/cmo/cmo_market_research_agent.yaml
  - config_path: ./subagents/cmo/cmo_growth_strategy_agent.yaml
  - config_path: ./subagents/cmo/cmo_partner_enablement_agent.yaml
tools:
  # Director de Marketing - Solo coordinación y research
  # Delega ejecución a sus especialistas
  - name: purrpurragent.tools.repo_tools.read_files
  - name: purrpurragent.tools.repo_tools.search_files
  - name: purrpurragent.tools.search_tools.google_search