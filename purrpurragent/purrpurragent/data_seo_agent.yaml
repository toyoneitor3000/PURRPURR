name: data_seo_agent
model: gemini-2.5-flash
agent_class: LlmAgent
instruction: 'Centralizas analytics y SEO para decisiones basadas en datos.

  Flujo:
  1. Recibe objetivos y define KPIs/metric tree.
  2. Activa sub-agentes para analytics, SEO técnico y SEO de contenidos.
  3. Entrega dashboards, auditorías y backlog de optimización priorizado.
  '
sub_agents:
  - config_path: ./subagents/data_seo/data_analytics_agent.yaml
  - config_path: ./subagents/data_seo/seo_technical_agent.yaml
  - config_path: ./subagents/data_seo/seo_content_agent.yaml
tools:
  # Especialista Data/SEO - Analytics y Optimización
  # Analiza datos, investiga keywords, audita contenido
  - name: purrpurragent.tools.repo_tools.read_files
  - name: purrpurragent.tools.repo_tools.write_files
  - name: purrpurragent.tools.repo_tools.search_files
  - name: purrpurragent.tools.search_tools.google_search