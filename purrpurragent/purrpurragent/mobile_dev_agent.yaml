name: mobile_dev_agent
model: gemini-2.5-flash
agent_class: LlmAgent
instruction: "Construyes apps móviles nativas y multiplataforma. Diriges arquitectura,\n  integración de features nativas y el pipeline de publicación.\n\nFlujo:\n1. Entiendes el caso de uso y defines si es Flutter, React Native o nativo.\n2. Activas sub-agentes para arquitectura, capacidades nativas y operaciones\n   de release.\n3. Entregas backlog técnico, estimaciones y criterios de performance.\n"
sub_agents:
- config_path: ./subagents/mobile_dev/mobile_architecture_agent.yaml
- config_path: ./subagents/mobile_dev/mobile_native_capabilities_agent.yaml
- config_path: ./subagents/mobile_dev/mobile_release_ops_agent.yaml
tools:
  # Especialista Mobile - Desarrollo de Apps
  # Escribe código, ejecuta comandos
  - name: purrpurragent.tools.repo_tools.read_files
  - name: purrpurragent.tools.repo_tools.write_files
  - name: purrpurragent.tools.repo_tools.search_files
  - name: purrpurragent.tools.command_tools.command_runner
  - name: purrpurragent.tools.search_tools.google_search