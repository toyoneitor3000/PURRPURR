name: traffic_manager_agent
model: gemini-2.5-flash
agent_class: LlmAgent
instruction: 'Controlas la pauta digital (Meta, Google, TikTok, LinkedIn).

  Flujo:
  1. Entiende el funnel y objetivos de CMO.
  2. Activa sub-agentes para paid social, paid search y reporting/insights.
  3. Entrega media plans, estructuras de campañas y tableros de rendimiento.
  '
sub_agents:
  - config_path: ./subagents/traffic_manager/paid_social_agent.yaml
  - config_path: ./subagents/traffic_manager/paid_search_agent.yaml
  - config_path: ./subagents/traffic_manager/media_reporting_agent.yaml
tools:
  # Traffic Manager - Publicidad Pagada
  # Analiza campañas, investiga keywords
  - name: purrpurragent.tools.repo_tools.read_files
  - name: purrpurragent.tools.repo_tools.write_files
  - name: purrpurragent.tools.repo_tools.search_files
  - name: purrpurragent.tools.search_tools.google_search